@if (mostrarFormulario()) {
<app-formulario-usuario [usuarioEditar]="usuarioSeleccionado()" (guardar)="agregarUsuario()"></app-formulario-usuario>

}

<h2>Lista de usuarios</h2>

<div class="barra-acciones">
    <mat-button-toggle-group name="fontStyle" aria-label="Font Style" [value]="vista()"
    (change)="cambiarVista($event.value)">
        <mat-button-toggle value="card"><mat-icon>view_comfy</mat-icon></mat-button-toggle>
        <mat-button-toggle value="table"><mat-icon>list</mat-icon></mat-button-toggle>
    </mat-button-toggle-group>

    <mat-form-field appearance="outline">
        <mat-label>Buscar usuario</mat-label>
        <input matInput #busqueda (input)="busquedaF.set(busqueda.value)" placeholder="Nombre">
    </mat-form-field>

    <button mat-raised-button color="primary" (click)="agregarUsuario()">
        <mat-icon>person_add</mat-icon>
        Nuevo usuario
    </button>
</div>
@if (vista() === 'card') {
    <div class="contenedor-tarjetas">
    @for (usuario of filtroUsuarios(); track $index) {
    <app-usuario-card [usuario]="usuario" (editar)="editarUsuario($event)"
        (eliminar)="eliminarUsuario($event)"></app-usuario-card>
    }
    @empty{
    <p>No hay usuarios</p>
    }
</div>
}
@else {
    <app-tabla-usuarios [listaUsuarios]="filtroUsuarios()" (editar)="editarUsuario($event)" (eliminar)="eliminarUsuario($event)">></app-tabla-usuarios>
}
